services:
  - type: web
    name: manasarthi-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://manasarthi-backend.onrender.com/api

  - type: web
    name: manasarthi-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push --accept-data-loss && npm run build && npx ts-node src/prisma/seed-production.ts
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: manasarthi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_INITIAL_PASSWORD
        generateValue: true
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://manasarthi-frontend.onrender.com
      - key: AI_PROVIDER_PRIORITY
        value: huggingface,gemini,openai,anthropic
      - key: AI_ENABLE_FALLBACK
        value: "true"
      - key: HUGGINGFACE_MODEL
        sync: false
      - key: HUGGINGFACE_API_KEY_1
        sync: false
      - key: HUGGINGFACE_API_KEY_2
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: GEMINI_API_KEY_1
        sync: false
      - key: OPENAI_API_KEY_1
        sync: false
      - key: ANTHROPIC_API_KEY_1
        sync: false

databases:
  - name: manasarthi-db
    databaseName: manasarthi
    user: manasarthi_user
    plan: free
    region: oregon
