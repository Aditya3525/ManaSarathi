services:
  - type: web
    name: manasarthi-backend
    branch: update
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm install --include=dev && npm run db:generate && npm run db:push:auto && npm run build && npm run seed:production
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: manasarthi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_INITIAL_PASSWORD
        generateValue: true
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://mana-sarathi-platform-frontend.vercel.app
      - key: BACKEND_URL
        value: https://mana-sarathi-platform.onrender.com
      - key: AI_PROVIDER_PRIORITY
        value: huggingface,gemini,openai,anthropic
      - key: AI_ENABLE_FALLBACK
        value: "true"
      - key: HUGGINGFACE_MODEL
        sync: false
      - key: HUGGINGFACE_API_KEY_1
        sync: false
      - key: HUGGINGFACE_API_KEY_2
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: GEMINI_API_KEY_1
        sync: false
      - key: OPENAI_API_KEY_1
        sync: false
      - key: ANTHROPIC_API_KEY_1
        sync: false

databases:
  - name: manasarthi-db
    databaseName: manasarthi
    user: manasarthi_user
    plan: starter
    region: oregon
