services:
  - type: web
    name: maansarathi-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: maansarathi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: AI_PROVIDER_PRIORITY
        value: huggingface,gemini,openai,anthropic
      - key: AI_ENABLE_FALLBACK
        value: "true"
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GEMINI_API_KEY_1
        sync: false
      - key: OPENAI_API_KEY_1
        sync: false
      - key: ANTHROPIC_API_KEY_1
        sync: false

databases:
  - name: maansarathi-db
    databaseName: maansarathi
    user: maansarathi_user
    plan: free
    region: oregon
