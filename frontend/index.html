  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Development helper: show uncaught errors in-page instead of blank white screen
      window.addEventListener('error', function (e) {
        try {
          const msg = (e && e.error && e.error.message) || e.message || String(e);
          const pre = document.createElement('pre');
          pre.style.position = 'fixed';
          pre.style.left = '0';
          pre.style.right = '0';
          pre.style.top = '0';
          pre.style.background = 'rgba(220,20,60,0.95)';
          pre.style.color = '#fff';
          pre.style.padding = '12px';
          pre.style.zIndex = '99999';
          pre.style.whiteSpace = 'pre-wrap';
          pre.textContent = 'Uncaught error: ' + msg;
          document.body.appendChild(pre);
        } catch (err) {
          console.error('Error displaying runtime error:', err);
        }
      });

      window.addEventListener('unhandledrejection', function (e) {
        const pre = document.createElement('pre');
        pre.style.position = 'fixed';
        pre.style.left = '0';
        pre.style.right = '0';
        pre.style.top = '0';
        pre.style.background = 'rgba(220,20,60,0.95)';
        pre.style.color = '#fff';
        pre.style.padding = '12px';
        pre.style.zIndex = '99999';
        pre.style.whiteSpace = 'pre-wrap';
        pre.textContent = 'Unhandled promise rejection: ' + (e && e.reason ? String(e.reason) : String(e));
        document.body.appendChild(pre);
      });
    </script>
    
    <!-- PWA Service Worker Registration (disabled for local/lan addresses to avoid dev cache issues) -->
    <script>
      // Do NOT register the SW on localhost or common LAN addresses (prevents stale/failed cache reads during development)
      const isLocalNetwork = ['localhost', '127.0.0.1'].includes(location.hostname) || /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1]))/.test(location.hostname);

      // If a SW was previously registered on a LAN host, unregister it in dev to avoid cache issues
      if (typeof navigator !== 'undefined' && 'serviceWorker' in navigator && isLocalNetwork) {
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister().then(() => console.log('Unregistered SW:', r.scope)).catch(() => {})));
      }

      if ('serviceWorker' in navigator && !isLocalNetwork) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then(registration => {
              console.log('SW registered:', registration);
              setInterval(() => registration.update(), 3600000);
            })
            .catch(error => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
